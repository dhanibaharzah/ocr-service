name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: orbitcreation-co-id
  REGION: us-central1
  SERVICE_NAME: ocr-service
  REPO_NAME: ocr-repo

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tesseract
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-ind tesseract-ocr-eng

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest httpx

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          BUILD_ID=$(gcloud builds submit --project "${{ env.PROJECT_ID }}" --tag "${IMAGE}" . --async --format='value(id)')
          echo "Waiting for build ${BUILD_ID}..."
          while true; do
            STATUS=$(gcloud builds describe "${BUILD_ID}" --project "${{ env.PROJECT_ID }}" --format='value(status)')
            echo "Build status: ${STATUS}"
            if [[ "${STATUS}" == "SUCCESS" ]]; then
              break
            fi
            if [[ "${STATUS}" == "FAILURE" || "${STATUS}" == "CANCELLED" || "${STATUS}" == "INTERNAL_ERROR" || "${STATUS}" == "TIMEOUT" ]]; then
              echo "Build failed with status: ${STATUS}"
              exit 1
            fi
            sleep 10
          done
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "${IMAGE}" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --timeout 120 \
            --concurrency 5 \
            --max-instances 3 \
            --min-instances 0 \
            --port 8080 \
            --set-env-vars "API_KEY=${{ secrets.OCR_API_KEY }},DEFAULT_LANG=ind+eng,MAX_FILE_SIZE_MB=10,MAX_PDF_PAGES=100,MAX_VERIFY_PAGES=5,VERIFY_PDF_DPI=150,DEBUG=false,CORS_ORIGINS=*"

      - name: Print service URL
        run: |
          gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region "${{ env.REGION }}" \
            --format='value(status.url)'
